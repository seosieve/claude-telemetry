[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-usage-tracker"
version = "0.1.0"
description = "Lightweight agent for centralized Claude Code token usage tracking"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "supabase>=2.0",
    "click>=8.1",
    "python-dateutil>=2.9",
]

[project.scripts]
claude-tracker = "claude_tracker.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
]
